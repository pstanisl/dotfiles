# "$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
command_timeout = 1000

[character]
success_symbol = "[➜](bold green)"

[package]
disabled = true

[line_break]
disabled = false

[python]
# Use python3 explicitly to avoid slow detection of pre-release Python 3.14
python_binary = "python3"
